<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>News Tracker</h1>
        <p>Последние новости из казахстанских источников</p>
    </header>

    <main>
        <div class="controls">
            <input 
                type="text" 
                id="search" 
                placeholder="Поиск по заголовкам..."
            >
            <select id="source-filter">
                <option value="">Все источники</option>
            </select>
            <button id="refresh-btn">Обновить</button>
        </div>

        <div id="stats"></div>
        <div id="news-grid"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
